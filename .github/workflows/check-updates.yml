name: Check for Updates

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Check Flutter version
        id: flutter
        run: |
          # Get latest stable Flutter version
          LATEST_FLUTTER=$(curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json \
            | jq -r '[.releases[] | select(.channel == "stable")][0].version')
          echo "version=$LATEST_FLUTTER" >> $GITHUB_OUTPUT
          echo "Latest Flutter stable: $LATEST_FLUTTER"

      - name: Check actions-runner image
        id: runner
        run: |
          # Get latest actions-runner image digest
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:actions/actions-runner:pull" | jq -r '.token')
          LATEST_DIGEST=$(curl -fsSL -H "Authorization: Bearer $TOKEN" \
            "https://ghcr.io/v2/actions/actions-runner/manifests/latest" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            2>/dev/null | jq -r '.config.digest // empty' || echo "")
          
          # If that didn't work, try getting the tag list
          if [ -z "$LATEST_DIGEST" ]; then
            LATEST_TAG=$(curl -fsSL -H "Authorization: Bearer $TOKEN" \
              "https://ghcr.io/v2/actions/actions-runner/tags/list" | jq -r '.tags | map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))) | sort_by(. | split(".") | map(tonumber)) | last')
            echo "Latest actions-runner tag: $LATEST_TAG"
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "digest=$LATEST_DIGEST" >> $GITHUB_OUTPUT
          fi

      - name: Get stored versions
        id: stored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to get stored versions from repository variable or a cache
          STORED_FLUTTER="${{ vars.LAST_FLUTTER_VERSION || '' }}"
          STORED_RUNNER="${{ vars.LAST_RUNNER_VERSION || '' }}"
          echo "stored_flutter=$STORED_FLUTTER" >> $GITHUB_OUTPUT
          echo "stored_runner=$STORED_RUNNER" >> $GITHUB_OUTPUT
          echo "Stored Flutter: $STORED_FLUTTER"
          echo "Stored Runner: $STORED_RUNNER"

      - name: Compare versions
        id: compare
        run: |
          FLUTTER_CHANGED="false"
          RUNNER_CHANGED="false"
          
          if [ -n "${{ steps.stored.outputs.stored_flutter }}" ] && [ "${{ steps.flutter.outputs.version }}" != "${{ steps.stored.outputs.stored_flutter }}" ]; then
            FLUTTER_CHANGED="true"
            echo "🆕 Flutter updated: ${{ steps.stored.outputs.stored_flutter }} → ${{ steps.flutter.outputs.version }}"
          fi
          
          RUNNER_VERSION="${{ steps.runner.outputs.tag }}${{ steps.runner.outputs.digest }}"
          if [ -n "${{ steps.stored.outputs.stored_runner }}" ] && [ "$RUNNER_VERSION" != "${{ steps.stored.outputs.stored_runner }}" ]; then
            RUNNER_CHANGED="true"
            echo "🆕 Runner updated: ${{ steps.stored.outputs.stored_runner }} → $RUNNER_VERSION"
          fi
          
          echo "flutter_changed=$FLUTTER_CHANGED" >> $GITHUB_OUTPUT
          echo "runner_changed=$RUNNER_CHANGED" >> $GITHUB_OUTPUT
          echo "runner_version=$RUNNER_VERSION" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: steps.compare.outputs.flutter_changed == 'true' || steps.compare.outputs.runner_changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MESSAGE="🔄 *GitHub Actions Runner Image Updates Available*\n\n"
          
          if [ "${{ steps.compare.outputs.flutter_changed }}" == "true" ]; then
            MESSAGE+="• *Flutter*: ${{ steps.stored.outputs.stored_flutter }} → ${{ steps.flutter.outputs.version }}\n"
          fi
          
          if [ "${{ steps.compare.outputs.runner_changed }}" == "true" ]; then
            MESSAGE+="• *actions-runner*: new version available\n"
          fi
          
          MESSAGE+="\nRebuild your runner image to get the latest versions:\n"
          MESSAGE+="\`\`\`./build-and-push.ps1\`\`\`"
          
          curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}"

      - name: Update stored versions
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_VARS }}
        run: |
          # Update repository variables with current versions
          # Note: Requires a PAT with repo scope stored as GH_PAT_VARS secret
          if [ -n "$GH_TOKEN" ]; then
            gh variable set LAST_FLUTTER_VERSION --body "${{ steps.flutter.outputs.version }}" || true
            gh variable set LAST_RUNNER_VERSION --body "${{ steps.compare.outputs.runner_version }}" || true
            echo "✓ Stored versions updated"
          else
            echo "⚠ GH_PAT_VARS secret not set - cannot persist version tracking"
            echo "Add a PAT with 'repo' scope as GH_PAT_VARS secret to enable version tracking"
          fi

      - name: Summary
        run: |
          echo "## Update Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Latest Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ steps.flutter.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| actions-runner | ${{ steps.runner.outputs.tag }}${{ steps.runner.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.compare.outputs.flutter_changed }}" == "true" ] || [ "${{ steps.compare.outputs.runner_changed }}" == "true" ]; then
            echo "🔔 **Updates detected - Slack notification sent**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No updates detected (or first run)" >> $GITHUB_STEP_SUMMARY
          fi

  check-docker-desktop-cpu-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Desktop high-CPU bug status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Track both issues for the com.docker.backend high-CPU bug (4.58+)
          # docker/for-win #15036 and docker/desktop-feedback #152
          FIXED="false"

          for ISSUE in "docker/for-win/issues/15036" "docker/desktop-feedback/issues/152"; do
            REPO=$(echo "$ISSUE" | cut -d'/' -f1-2)
            NUMBER=$(echo "$ISSUE" | cut -d'/' -f4)

            STATE=$(gh issue view "$NUMBER" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
            echo "$REPO#$NUMBER state: $STATE"

            if [ "$STATE" == "CLOSED" ]; then
              FIXED="true"
              FIXED_ISSUE="$REPO#$NUMBER"

              # Get recent comments for context on the fix
              LAST_COMMENTS=$(gh issue view "$NUMBER" --repo "$REPO" --json comments \
                --jq '[.comments[-3:][] | .body[:200]] | join("\n---\n")' 2>/dev/null || echo "")
              echo "fix_context<<EOF" >> $GITHUB_OUTPUT
              echo "$LAST_COMMENTS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              break
            fi
          done

          echo "fixed=$FIXED" >> $GITHUB_OUTPUT
          echo "fixed_issue=${FIXED_ISSUE:-}" >> $GITHUB_OUTPUT

          # Also check if a new Docker Desktop version was released that might contain the fix
          LATEST_DD=$(curl -fsSL "https://desktop.docker.com/win/main/amd64/appcast.xml" 2>/dev/null \
            | grep -oP 'sparkle:version="\K[^"]+' | head -1 || echo "unknown")
          echo "latest_dd=$LATEST_DD" >> $GITHUB_OUTPUT
          echo "Latest Docker Desktop: $LATEST_DD"

      - name: Notify Slack if fixed
        if: steps.check.outputs.fixed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping"
            exit 0
          fi

          ISSUE_URL="https://github.com/${{ steps.check.outputs.fixed_issue }}"
          LATEST_DD="${{ steps.check.outputs.latest_dd }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SLACK_MESSAGE=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "good",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "Docker Desktop High-CPU Bug Fixed!"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "The \`com.docker.backend\` high-CPU bug has been marked as resolved.\n\n*Issue:* <${ISSUE_URL}|${{ steps.check.outputs.fixed_issue }}>\n*Latest Docker Desktop:* \`${LATEST_DD}\`\n\nYou can update Docker Desktop from 4.57.0 to the latest version."
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Recent comments on the fix:*\n\`\`\`${{ steps.check.outputs.fix_context }}\`\`\`"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Issue"
                        },
                        "url": "${ISSUE_URL}"
                      },
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Workflow"
                        },
                        "url": "${RUN_URL}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$SLACK_MESSAGE"

      - name: Summary
        run: |
          echo "## Docker Desktop CPU Bug Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bug Fixed | ${{ steps.check.outputs.fixed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Docker Desktop | ${{ steps.check.outputs.latest_dd }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tracked Issues | docker/for-win#15036, docker/desktop-feedback#152 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.fixed }}" == "true" ]; then
            echo "**The bug has been fixed! Slack notification sent.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Bug is still open. Pinned to Docker Desktop 4.57.0." >> $GITHUB_STEP_SUMMARY
          fi









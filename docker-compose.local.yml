# Override for local ARM64 Mac - builds from Dockerfile instead of pulling image
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Flutter is NOT baked into the local image. /opt/flutter is a Docker volume
# (`flutter-sdk`) that mac-bootstrap-flutter.sh populates at container start
# by syncing to the git ref of the host's Flutter install (bind-mounted
# read-only at /host-flutter). After `flutter upgrade` on the host, restart
# the runners to pick up the new version — no image rebuild required.
#
# Set HOST_FLUTTER_PATH in .env if Flutter is installed somewhere other than
# the default Homebrew location (/opt/homebrew/share/flutter).

x-mac-vols: &mac-vols
  - ${HOST_FLUTTER_PATH:-/opt/homebrew/share/flutter}:/host-flutter:ro
  - ./mac-bootstrap-flutter.sh:/home/runner/mac-bootstrap-flutter.sh:ro
  - flutter-sdk:/opt/flutter
  # cursor-agent CLI for the composer-security-review workflow. The volume
  # is populated by update-cursor-agent.sh on the host (mirrors the Windows
  # update-cursor-agent.ps1 pattern). Without this mount the runner
  # workflow's "Verify cursor-agent is installed" guard step fails closed.
  - cursor-agent:/opt/cursor-agent

x-mac-entrypoint: &mac-entrypoint
  ["/bin/bash","-lc","/home/runner/mac-bootstrap-flutter.sh && /home/runner/register-and-run.sh"]

services:
  # Disable the Linux init container on Mac. mac-bootstrap-flutter.sh (called
  # from each runner's entrypoint) is the sole writer of the flutter-sdk volume
  # — it syncs to the host's Flutter git ref. Without this override, the init
  # container would fetch latest stable from GitHub and leave the volume in
  # detached HEAD ("channel [user-branch] • unknown source") before bootstrap
  # runs. The service stays defined so `depends_on: service_completed_successfully`
  # on each runner still resolves — `true` exits 0 immediately.
  flutter-sdk:
    entrypoint: ["true"]

  runner-1:
    build:
      context: .
      dockerfile: Dockerfile.runner.arm64
    image: actions-runner-flutter:local-arm64
    devices: !reset []
    volumes: *mac-vols
    entrypoint: *mac-entrypoint
  runner-2:
    image: actions-runner-flutter:local-arm64
    devices: !reset []
    volumes: *mac-vols
    entrypoint: *mac-entrypoint
    depends_on:
      - runner-1
  runner-3:
    image: actions-runner-flutter:local-arm64
    devices: !reset []
    volumes: *mac-vols
    entrypoint: *mac-entrypoint
    depends_on:
      - runner-1
  runner-4:
    image: actions-runner-flutter:local-arm64
    devices: !reset []
    volumes: *mac-vols
    entrypoint: *mac-entrypoint
    depends_on:
      - runner-1

volumes:
  flutter-sdk:
  # Inherited declaration from docker-compose.yml; restated here so this
  # override file is self-documenting about every volume it mounts.
  cursor-agent:
